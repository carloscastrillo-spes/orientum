<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orientum</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }.contenedor {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 740px;
      height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }.cabecera {
      padding: 18px 24px;
      border-bottom: 1px solid #e8e4df;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }.cabecera h1 {
      font-size: 1.15rem;
      color: #1a1a1a;
      font-weight: bold;
      letter-spacing: 0.02em;
    }.cabecera span {
      font-size: 0.8rem;
      color: #999;
      font-style: italic;
    }.chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }.burbuja {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.65;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }.burbuja.usuario {
      background: #1a1a1a;
      color: #f5f3ef;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }.burbuja.asistente {
      background: #f0ede8;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }.burbuja.escribiendo {
      color: #aaa;
      font-style: italic;
      background: #f7f5f2;
    }.entrada {
      padding: 14px 20px;
      border-top: 1px solid #e8e4df;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1px solid #d5d2cc;
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 0.92rem;
      font-family: 'Georgia', serif;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      overflow-y: auto;
    }

    textarea:focus { border-color: #1a1a1a; }

    button {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 11px 20px;
      font-size: 0.9rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      height: 48px;
    }

    button:hover:not(:disabled) { background: #333; }
    button:disabled { background: #bbb; cursor: not-allowed; }.chat::-webkit-scrollbar { width: 4px; }.chat::-webkit-scrollbar-thumb { background: #d5d2cc; border-radius: 4px; }
  </style>
</head>
<body>

<div class="contenedor">
  <div class="cabecera">
    <h1>Orientum</h1>
    <span>consulta libre</span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="entrada">
    <textarea
      id="input"
      placeholder="Escribí tu consulta..."
      rows="1"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); enviar(); }"
      oninput="this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px';"
    ></textarea>
    <button id="btn" onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const btn = document.getElementById("btn");

  function agregar(texto, clase) {
    const div = document.createElement("div");
    div.className = "burbuja " + clase;
    div.innerHTML = texto
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function enviar() {
    const texto = input.value.trim();
    if (!texto) return;

    input.value = "";
    input.style.height = "auto";
    btn.disabled = true;

    agregar(texto, "usuario");
    const espera = agregar("escribiendo...", "asistente escribiendo");

    try {
      const res = await fetch("/.netlify/functions/oracle", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensaje: texto })
      });

      const data = await res.json();
      espera.remove();

      if (data.respuesta) {
        agregar(data.respuesta, "asistente");
      } else {
        agregar("No se pudo obtener respuesta.", "asistente");
      }

    } catch (err) {
      espera.remove();
      agregar("Error de conexión. Intentá nuevamente.", "asistente");
    }

    btn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
